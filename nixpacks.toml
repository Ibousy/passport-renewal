[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_sqlite", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.tokenizer", "php84Extensions.ctype", "php84Extensions.fileinfo", "nodejs_22", "nodePackages.npm", "unzip"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php && mv composer.phar /usr/local/bin/composer",
  "composer install --no-dev --optimize-autoloader --no-scripts --no-interaction",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
